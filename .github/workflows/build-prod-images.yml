name: Build production images

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: techeer-bootcamp-2026-summer-team-c

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv and dependencies
        run: |
          pip install uv==0.11.11
          uv sync --locked --dev

      - name: Backend lint and tests
        run: |
          uv run ruff check .
          bash -n tools/backup_production_data.sh
          uv run pip-audit --local --skip-editable
          uv run pytest -m "not integration"

      - name: Production Compose checks
        run: |
          docker compose --env-file .env.production.example -f compose.prod.yaml config --quiet
          docker compose --env-file deploy/portainer/env.infra.example -f deploy/portainer/compose.infra.yaml config --quiet
          docker compose --env-file deploy/portainer/env.service.example -f deploy/portainer/compose.service.yaml config --quiet

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: team-c-backend
            dockerfile: deploy/docker/backend.Dockerfile
          - image: team-c-nginx
            dockerfile: deploy/docker/nginx.Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  promote:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pin service images to the built commit SHA
        run: python3 deploy/portainer/pin-images.py "${{ github.sha }}"

      - name: Publish production deploy manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B production
          git add deploy/portainer/compose.service.yaml
          git commit -m "deploy: pin service images to ${GITHUB_SHA}"
          git push --force origin production
