name: Build production images

on:
  push:
    branches:
      - main
    paths:
      - ".dockerignore"
      - ".github/workflows/build-prod-images.yml"
      - "backend/**"
      - "deploy/docker/**"
      - "deploy/nginx/**"
      - "deploy/portainer/**"
      - "mappings/**"
      - "migrations/**"
      - "rules/**"
      - "schemas/**"
      - "tools/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: techeer-bootcamp-2026-summer-team-c

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: team-c-backend
            dockerfile: deploy/docker/backend.Dockerfile
          - image: team-c-nginx
            dockerfile: deploy/docker/nginx.Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  promote:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pin service images to the built commit SHA
        run: python3 deploy/portainer/pin-images.py "${{ github.sha }}"

      - name: Publish production deploy manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B production
          git add deploy/portainer/compose.service.yaml
          git commit -m "deploy: pin service images to ${GITHUB_SHA}"
          git push --force origin production
