name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv and backend dependencies
        run: |
          pip install uv==0.11.11
          uv sync --locked --dev

      - name: Backend lint
        run: |
          uv run ruff check .
          bash -n tools/backup_production_data.sh

      - name: Backend dependency audit
        run: uv run pip-audit --local --skip-editable

      - name: Backend tests
        run: uv run pytest -m "not integration"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend contract, type, lint, test, and build checks
        working-directory: frontend
        run: |
          npm run openapi:check
          npm run typecheck
          npm run lint
          npm test
          npm run build

      - name: Production Compose checks
        run: |
          docker compose --env-file .env.production.example -f compose.prod.yaml config --quiet
          docker compose --env-file deploy/portainer/env.infra.example -f deploy/portainer/compose.infra.yaml config --quiet
          docker compose --env-file deploy/portainer/env.service.example -f deploy/portainer/compose.service.yaml config --quiet
