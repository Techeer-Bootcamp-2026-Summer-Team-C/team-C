worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    limit_req_zone $binary_remote_addr zone=dashboard_login:10m rate=10r/m;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    upstream backend_upstream {
        zone backend_upstream 64k;
        server backend:8000 resolve;
    }

    server {
        listen 8080;
        server_name _;

        client_max_body_size 6m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location = /nginx-health {
            access_log off;
            default_type text/plain;
            return 200 'ok';
        }

        location ^~ /api/v1/collector/ {
            return 404;
        }

        location = /api/v1/auth/login {
            limit_req zone=dashboard_login burst=10 nodelay;
            limit_req_status 429;
            error_page 429 = @login_rate_limited;

            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-EDR-mTLS-Verify '';
            proxy_set_header X-EDR-Client-Certificate '';
            proxy_set_header X-EDR-Certificate-Subject '';
            proxy_set_header X-EDR-Certificate-SAN-Agent-ID '';
            proxy_set_header X-EDR-Certificate-Fingerprint-SHA256 '';
            proxy_set_header X-EDR-Certificate-Not-Before '';
            proxy_set_header X-EDR-Certificate-Not-After '';
        }

        location @login_rate_limited {
            default_type application/json;
            add_header Retry-After 60 always;
            add_header X-Request-ID "nginx_$request_id" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            return 429 '{"error":{"code":"RATE_LIMITED","message":"Too many login attempts. Retry later.","retryable":true,"details":[]},"meta":{"requestId":"nginx_$request_id"}}';
        }

        location ^~ /api/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-EDR-mTLS-Verify '';
            proxy_set_header X-EDR-Client-Certificate '';
            proxy_set_header X-EDR-Certificate-Subject '';
            proxy_set_header X-EDR-Certificate-SAN-Agent-ID '';
            proxy_set_header X-EDR-Certificate-Fingerprint-SHA256 '';
            proxy_set_header X-EDR-Certificate-Not-Before '';
            proxy_set_header X-EDR-Certificate-Not-After '';
        }

        location ~ ^/(docs(?:/|$)|redoc(?:/|$)|openapi\.json$) {
            return 404;
        }

        location ^~ /health/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-EDR-mTLS-Verify '';
            proxy_set_header X-EDR-Client-Certificate '';
            proxy_set_header X-EDR-Certificate-Subject '';
            proxy_set_header X-EDR-Certificate-SAN-Agent-ID '';
            proxy_set_header X-EDR-Certificate-Fingerprint-SHA256 '';
            proxy_set_header X-EDR-Certificate-Not-Before '';
            proxy_set_header X-EDR-Certificate-Not-After '';
        }

        location / {
            return 404;
        }
    }

    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_client_certificate /etc/nginx/certs/agent-ca.crt;
        ssl_verify_client on;
        ssl_verify_depth 2;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 6m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location ^~ /api/v1/collector/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-EDR-mTLS-Verify $ssl_client_verify;
            proxy_set_header X-EDR-Client-Certificate $ssl_client_escaped_cert;
            proxy_set_header X-EDR-Certificate-Subject '';
            proxy_set_header X-EDR-Certificate-SAN-Agent-ID '';
            proxy_set_header X-EDR-Certificate-Fingerprint-SHA256 '';
            proxy_set_header X-EDR-Certificate-Not-Before '';
            proxy_set_header X-EDR-Certificate-Not-After '';
        }

        location / {
            return 404;
        }
    }
}
