# mTLS 검증을 마친 Collector location 안에서만 include한다. 각 지시문은
# client가 같은 이름으로 보낸 header를 덮어쓴다. SAN과 SHA-256 변수는
# TLS termination build에서 제공한다.
proxy_set_header X-EDR-mTLS-Verify $ssl_client_verify;
proxy_set_header X-EDR-Certificate-Subject $ssl_client_s_dn;
proxy_set_header X-EDR-Certificate-SAN-Agent-ID $edr_ssl_client_san_agent_id;
proxy_set_header X-EDR-Certificate-Fingerprint-SHA256 $edr_ssl_client_fingerprint_sha256;
proxy_set_header X-EDR-Certificate-Not-Before $ssl_client_v_start;
proxy_set_header X-EDR-Certificate-Not-After $ssl_client_v_end;
