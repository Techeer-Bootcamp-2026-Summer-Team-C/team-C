name: portainer

services:
  portainer:
    image: portainer/portainer-ce:2.39.5-alpine
    container_name: portainer
    ports:
      - "127.0.0.1:9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - portainer-network
    restart: unless-stopped

volumes:
  portainer-data:
    external: true
    name: portainer_data

networks:
  portainer-network:
    name: portainer-network
