name: portainer

services:
  portainer-agent:
    image: portainer/agent:2.39.5-alpine
    container_name: portainer-agent
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - /:/host
    networks:
      - portainer-network
    restart: unless-stopped

networks:
  portainer-network:
    external: true
    name: portainer-network
