name: edr-c-infra

services:
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edr}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      data:
        aliases:
          - postgres
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8.14.39
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-edr}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER is required}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user \"$$CLICKHOUSE_USER\" --password \"$$CLICKHOUSE_PASSWORD\" --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      data:
        aliases:
          - clickhouse
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      data:
        aliases:
          - kafka
    restart: unless-stopped

networks:
  data:
    external: true
    name: edr-c-data

volumes:
  postgres-data:
    external: true
    name: ${POSTGRES_VOLUME_NAME:?POSTGRES_VOLUME_NAME is required}
  clickhouse-data:
    external: true
    name: ${CLICKHOUSE_VOLUME_NAME:?CLICKHOUSE_VOLUME_NAME is required}
  kafka-data:
    external: true
    name: ${KAFKA_VOLUME_NAME:?KAFKA_VOLUME_NAME is required}
